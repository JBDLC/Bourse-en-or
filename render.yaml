services:
  # ── Backend Python (FastAPI) ──────────────────────────────────────────────
  - type: web
    name: pea-trading-backend
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      # Render utilise Python 3.14 par défaut : pandas/numpy ne compilent pas dessus
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: pea-trading-db
          property: connectionString
      - key: REDIS_URL
        sync: false   # Depuis Upstash (gratuit)
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        value: '["https://pea-trading-frontend.onrender.com"]'
    healthCheckPath: /api/health

  # ── Frontend React (Static Site) ─────────────────────────────────────────
  - type: web
    name: pea-trading-frontend
    runtime: static
    # Pas de `region` ni `plan` ici : les Static Sites Render ne les acceptent pas dans un Blueprint
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://pea-trading-backend.onrender.com
      - key: VITE_WS_URL
        value: wss://pea-trading-backend.onrender.com/ws
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff

# ── Base de données PostgreSQL ────────────────────────────────────────────
databases:
  - name: pea-trading-db
    region: frankfurt
    plan: free
    databaseName: pea_trading
    user: pea_user
